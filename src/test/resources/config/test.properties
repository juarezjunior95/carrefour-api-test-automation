# API Configuration
# Use environment variables for sensitive data
# Priority: Environment Variables > This File

# Default values (override with environment variables)
base.url=https://serverest.dev
admin.email=admin@carrefour.com
admin.password=admin123

# Timeouts (in milliseconds)
connection.timeout=30000
socket.timeout=30000

# Retry Configuration
max.retries=3
retry.delay=1000

# Logging Configuration
# Logs will only be shown when tests fail
log.on.failure.only=true

# Test Data
default.content.type=application/json
default.charset=UTF-8
